name: Michaela Laptop Price Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"
      timezone: "America/New_York"

permissions:
  contents: read
  issues: write

jobs:
  watch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python price_agent.py > results.json 2> error.log
          echo "----- Results -----"
          cat results.json || true
          echo "----- Errors -----"
          cat error.log || true
          exit 0

      - name: Email results
        if: always()
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage
          from pathlib import Path
          from datetime import datetime

          sender = os.environ["MAIL_USERNAME"]
          password = os.environ["MAIL_PASSWORD"]
          recipient = os.environ["MAIL_TO"]

          results = Path("results.json").read_text() if Path("results.json").exists() else "No results file found."
          errors = Path("error.log").read_text() if Path("error.log").exists() else ""

          msg = EmailMessage()
          msg["From"] = sender
          msg["To"] = recipient
          msg["Subject"] = "Michaela Laptop Price Report"

          body = f"""Michaela Laptop Price Agent Results

          Run time: {datetime.now().strftime("%Y-%m-%d %H:%M:%S")}

          Results:
          {results}

          Errors:
          {errors}
          """

          msg.set_content(body)

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(sender, password)
              smtp.send_message(msg)

          print("Email sent.")
          PY
