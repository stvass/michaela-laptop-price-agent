name: Michaela Laptop Price Watch

on:
  workflow_dispatch:
  schedule:
    # Runs daily. This is UTC time.
    - cron: "17 11 * * *"

permissions:
  contents: write
  issues: write

jobs:
  watch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python price_agent.py

      - name: Commit latest price data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/*.md || true
          git diff --cached --quiet || git commit -m "Update laptop price watch data"
          git push
